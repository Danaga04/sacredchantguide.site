<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Thank You For Your Purchase</title>
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background-color: #f4f5f7;
            color: #333333;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            padding: 20px;
            box-sizing: border-box;
        }
        .thank-you-container {
            background-color: #ffffff;
            padding: 40px 30px;
            border-radius: 10px;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.05);
            max-width: 500px;
            width: 100%;
            text-align: center;
        }
        .icon {
            color: #10b981; /* Verde conversão */
            font-size: 70px;
            line-height: 1;
            margin-bottom: 20px;
        }
        h1 {
            font-size: 26px;
            color: #111827;
            margin-bottom: 15px;
            margin-top: 0;
        }
        p {
            font-size: 16px;
            line-height: 1.6;
            color: #4b5563;
            margin-bottom: 15px;
        }
        .support-box {
            background-color: #f9fafb;
            border: 1px solid #e5e7eb;
            padding: 20px;
            border-radius: 8px;
            margin-top: 30px;
            font-size: 15px;
        }
        .support-box a {
            color: #2563eb;
            text-decoration: none;
            font-weight: 600;
            display: inline-block;
            margin-top: 5px;
        }
        .support-box a:hover {
            text-decoration: underline;
        }
        .billing-notice {
            font-size: 13px;
            color: #6b7280;
            margin-top: 25px;
            border-top: 1px solid #e5e7eb;
            padding-top: 15px;
        }
    </style>
</head>
<body>

    <div class="thank-you-container">
        <div class="icon">✓</div>
        
        <h1>Thank you for your purchase!</h1>
        
        <p>Your access details have been sent to your email.</p>
        <p>You can access your product using the link provided after checkout.</p>
        
        <div class="support-box">
            If you need any support, please contact:<br>
            <a href="mailto:suporte@vcbemcomseucorpo.site">suporte@vcbemcomseucorpo.site</a>
        </div>
        
        <p class="billing-notice">
            The charge will appear as <strong>Digistore24.com</strong>
        </p>
    </div>

</body>
</html>
