    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background-color: #f4f5f7;
            color: #333333;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            padding: 20px;
            box-sizing: border-box;
        }
        .thank-you-container {
            background-color: #ffffff;
            padding: 40px 30px;
            border-radius: 10px;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.05);
            max-width: 500px;
            width: 100%;
            text-align: center;
        }
        .icon {
            color: #10b981; 
            font-size: 70px;
            line-height: 1;
            margin-bottom: 20px;
        }
        h1 {
            font-size: 26px;
            color: #111827;
            margin-bottom: 15px;
            margin-top: 0;
        }
        p {
            font-size: 16px;
            line-height: 1.6;
            color: #4b5563;
            margin-bottom: 15px;
        }
        
        /* Estilos do Botão de Acesso */
        .access-btn {
            display: inline-block;
            background-color: #10b981; /* Verde chamativo para conversão/ação */
            color: #ffffff;
            text-decoration: none;
            font-size: 18px;
            font-weight: bold;
            padding: 16px 30px;
            border-radius: 8px;
            margin: 20px 0;
            width: 100%;
            max-width: 350px;
            box-sizing: border-box;
            box-shadow: 0 4px 6px rgba(16, 185, 129, 0.3);
            transition: background-color 0.3s, transform 0.2s;
        }
        .access-btn:hover {
            background-color: #059669;
            transform: translateY(-2px);
        }

        .support-box {
            background-color: #f9fafb;
            border: 1px solid #e5e7eb;
            padding: 20px;
            border-radius: 8px;
            margin-top: 25px;
            font-size: 15px;
        }
        .support-box a {
            color: #2563eb;
            text-decoration: none;
            font-weight: 600;
            display: inline-block;
            margin-top: 5px;
        }
        .support-box a:hover {
            text-decoration: underline;
        }
        .billing-notice {
            font-size: 13px;
            color: #6b7280;
            margin-top: 25px;
            border-top: 1px solid #e5e7eb;
            padding-top: 15px;
        }
